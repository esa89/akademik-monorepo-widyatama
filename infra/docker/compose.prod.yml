# =============================================================================
# SYTAMA — Production Docker Compose
# =============================================================================
# Deploy di VPS dengan Cloudflare Tunnel (tanpa nginx — CF Tunnel langsung
# ke setiap port service).
#
# Sebelum menjalankan:
#   cp infra/docker/.env.prod.example /root/sytama/.env
#   # Edit .env sesuai nilai produksi
#   docker compose -f /root/sytama/compose.prod.yml --env-file /root/sytama/.env up -d
#
# Port mapping untuk Cloudflare Tunnel routes:
#   auth.obe-if-utama.web.id        → localhost:9010  (Authentik)
#   sso.obe-if-utama.web.id         → localhost:5174  (fe-identity)
#   api-identity.obe-if-utama.web.id → localhost:3013 (api-identity)
#   api-akademik.obe-if-utama.web.id → localhost:3015 (api-akademik)
#   api-obe.obe-if-utama.web.id     → localhost:3014  (api-obe)
#   prodi.obe-if-utama.web.id       → localhost:6174  (fe-jurusan)
#   akademik.obe-if-utama.web.id    → localhost:6175  (fe-akademik)
#   dosen.obe-if-utama.web.id       → localhost:6173  (fe-dosen)
# =============================================================================

name: sytama-prod

services:

  # ── Database ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${PG_DB}
      POSTGRES_USER:     ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sytama

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - sytama

  # ── Authentik SSO ─────────────────────────────────────────────────────────────
  authentik-server:
    image: ghcr.io/goauthentik/server:2025.4
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_SECRET_KEY:             ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST:       postgres
      AUTHENTIK_POSTGRESQL__USER:       ${PG_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD:   ${PG_PASS}
      AUTHENTIK_POSTGRESQL__NAME:       ${PG_DB}
      AUTHENTIK_REDIS__HOST:            redis
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_CORS__ENABLED:          "true"
      AUTHENTIK_CORS__ALLOWED_ORIGINS:  "https://prodi.obe-if-utama.web.id,https://akademik.obe-if-utama.web.id,https://dosen.obe-if-utama.web.id,https://sso.obe-if-utama.web.id,https://api-identity.obe-if-utama.web.id"
      AUTHENTIK_BOOTSTRAP_EMAIL:        ${AUTHENTIK_BOOTSTRAP_EMAIL}
      AUTHENTIK_BOOTSTRAP_PASSWORD:     ${AUTHENTIK_BOOTSTRAP_PASSWORD}
    ports:
      - "9010:9000"
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
      - ./blueprints:/blueprints/custom
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sytama

  authentik-worker:
    image: ghcr.io/goauthentik/server:2025.4
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY:           ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST:     postgres
      AUTHENTIK_POSTGRESQL__USER:     ${PG_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_POSTGRESQL__NAME:     ${PG_DB}
      AUTHENTIK_REDIS__HOST:          redis
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_BOOTSTRAP_EMAIL:      ${AUTHENTIK_BOOTSTRAP_EMAIL}
      AUTHENTIK_BOOTSTRAP_PASSWORD:   ${AUTHENTIK_BOOTSTRAP_PASSWORD}
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
      - ./blueprints:/blueprints/custom
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sytama

  # ── Backend APIs ──────────────────────────────────────────────────────────────
  api-identity:
    image: ghcr.io/esa89/akademik-monorepo-widyatama/api-identity:latest
    restart: unless-stopped
    ports:
      - "3013:3013"
    environment:
      PORT:                    3013
      NODE_ENV:                production
      AUTHENTIK_URL:           http://authentik-server:9000
      AUTHENTIK_CLIENT_ID:     fe-identity
      AUTHENTIK_CLIENT_SECRET: ${VITE_AUTHENTIK_CLIENT_SECRET}
      AUTHENTIK_ADMIN_TOKEN:   ${AUTHENTIK_ADMIN_TOKEN}
      FE_IDENTITY_URL:         https://sso.obe-if-utama.web.id
      FE_DOSEN_URL:            https://dosen.obe-if-utama.web.id
      CORS_ORIGINS:            https://prodi.obe-if-utama.web.id,https://akademik.obe-if-utama.web.id,https://dosen.obe-if-utama.web.id,https://sso.obe-if-utama.web.id
    depends_on:
      - authentik-server
    networks:
      - sytama

  api-akademik:
    image: ghcr.io/esa89/akademik-monorepo-widyatama/api-akademik:latest
    restart: unless-stopped
    ports:
      - "3015:3015"
    environment:
      PORT:             3015
      NODE_ENV:         production
      DATABASE_URL:     postgresql://${PG_USER}:${PG_PASS}@postgres:5432/systama_akademik
      CORS_ORIGINS:     https://prodi.obe-if-utama.web.id,https://akademik.obe-if-utama.web.id,https://dosen.obe-if-utama.web.id
      IDENTITY_API_URL: http://api-identity:3013
      SWAGGER_ENABLED:  "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sytama

  api-obe:
    image: ghcr.io/esa89/akademik-monorepo-widyatama/api-obe:latest
    restart: unless-stopped
    ports:
      - "3014:3014"
    environment:
      PORT:            3014
      NODE_ENV:        production
      DATABASE_URL:    postgresql://${PG_USER}:${PG_PASS}@postgres:5432/systama_obe
      CORS_ORIGINS:    https://prodi.obe-if-utama.web.id,https://akademik.obe-if-utama.web.id,https://dosen.obe-if-utama.web.id
      SWAGGER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sytama

  # ── Frontends ─────────────────────────────────────────────────────────────────
  fe-identity:
    image: ghcr.io/esa89/akademik-monorepo-widyatama/fe-identity:latest
    restart: unless-stopped
    ports:
      - "5174:3000"
    networks:
      - sytama

  fe-jurusan:
    image: ghcr.io/esa89/akademik-monorepo-widyatama/fe-jurusan:latest
    restart: unless-stopped
    ports:
      - "6174:3000"
    networks:
      - sytama

  fe-akademik:
    image: ghcr.io/esa89/akademik-monorepo-widyatama/fe-akademik:latest
    restart: unless-stopped
    ports:
      - "6175:3000"
    networks:
      - sytama

  fe-dosen:
    image: ghcr.io/esa89/akademik-monorepo-widyatama/fe-dosen:latest
    restart: unless-stopped
    ports:
      - "6173:3000"
    networks:
      - sytama

volumes:
  postgres_data:
  authentik_media:
  authentik_templates:

networks:
  sytama:
    driver: bridge
